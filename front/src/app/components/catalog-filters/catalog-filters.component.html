<!-- Mobile Filter Toggle -->
<div class="mobile-toggle">
  <span class="mobile-title">Filtros y Búsqueda</span>
  <button
    (click)="isMobileFiltersOpen = !isMobileFiltersOpen"
    class="mobile-toggle-btn">
    <span class="material-symbols-rounded">filter_alt</span>
    {{ isMobileFiltersOpen ? 'Cerrar' : 'Filtrar' }}
  </button>
</div>

<!-- Sidebar -->
<aside
  [class.hidden]="!isMobileFiltersOpen"
  class="filters-sidebar lg:block animate-fade-in-up">

  <div class="sidebar-header">
    <h3 class="sidebar-title">Filtros de Catálogo</h3>
    <button (click)="resetFilters()" class="reset-btn">
      <span class="material-symbols-rounded">restart_alt</span> Limpiar
    </button>
  </div>

  <!-- Búsqueda -->
  <div class="filter-group">
    <label class="filter-label">Buscar</label>
    <div class="input-wrap">
      <span class="material-symbols-rounded input-icon">search</span>
      <input type="text" [(ngModel)]="filters.searchQuery" (input)="emitFilters()"
             placeholder="Nombre, SKU..." class="filter-input">
    </div>
  </div>

  <!-- Ordenar -->
  <div class="filter-group">
    <label class="filter-label">Ordenar Por</label>
    <select [(ngModel)]="filters.sortBy" (change)="emitFilters()" class="filter-select">
      <option value="name-asc">Nombre: A-Z</option>
      <option value="name-desc">Nombre: Z-A</option>
      <option value="price-asc">Precio: Menor a Mayor</option>
      <option value="price-desc">Precio: Mayor a Menor</option>
    </select>
  </div>

  <!-- Categorías -->
  <div class="filter-group">
    <label class="filter-label">Categorías</label>
    <div class="cat-list">
      <button (click)="selectCategory(null)"
              class="cat-item" [class.active]="filters.categoriaId === null">Todas</button>
      <div *ngFor="let cat of categorias">
        <span class="cat-parent-label">{{ cat.nombre }}</span>
        <button *ngFor="let sub of cat.subcategorias"
                (click)="selectCategory(sub.id)"
                class="cat-item cat-sub" [class.active]="filters.categoriaId === sub.id">
          {{ sub.nombre }}
        </button>
      </div>
    </div>
  </div>

  <!-- Género -->
  <div class="filter-group">
    <label class="filter-label">Género</label>
    <div class="seg-control">
      <button *ngFor="let gen of ['', 'Hombre', 'Mujer']"
              (click)="filters.genero = gen; emitFilters()"
              class="seg-btn" [class.active]="filters.genero === gen">
        {{ gen === '' ? 'Todos' : gen }}
      </button>
    </div>
  </div>

  <!-- Marcas -->
  <div class="filter-group">
    <label class="filter-label">Marca</label>
    <select [(ngModel)]="filters.marcaId" (change)="emitFilters()" class="filter-select">
      <option [ngValue]="null">Todas las marcas</option>
      <option *ngFor="let m of marcas" [ngValue]="m.id">{{ m.nombre }}</option>
    </select>
  </div>

  <!-- Tallas -->
  <div class="filter-group">
    <label class="filter-label">Talla</label>
    <div class="talla-grid">
      <button *ngFor="let t of tallas" (click)="selectTalla(t.id)"
              class="talla-btn" [class.active]="filters.tallaId === t.id">
        {{ t.nombre }}
      </button>
    </div>
  </div>

  <!-- Colores -->
  <div class="filter-group">
    <label class="filter-label">Color</label>
    <div class="color-dots">
      <button *ngFor="let c of colores" (click)="selectColor(c.id)"
              [style.background-color]="c.hex"
              [title]="c.nombre"
              class="color-dot" [class.selected]="filters.colorId === c.id">
      </button>
    </div>
  </div>

  <!-- Telas -->
  <div class="filter-group">
    <label class="filter-label">Material / Tela</label>
    <select [(ngModel)]="filters.telaId" (change)="emitFilters()" class="filter-select">
      <option [ngValue]="null">Todos los materiales</option>
      <option *ngFor="let t of telas" [ngValue]="t.id">{{ t.nombre }}</option>
    </select>
  </div>

  <!-- Precios -->
  <div class="filter-group">
    <label class="filter-label">Rango de Precios (COP)</label>
    <div class="price-range">
      <input type="number" [(ngModel)]="filters.minPrice" (input)="emitFilters()"
             placeholder="Mín" class="filter-input price-input">
      <input type="number" [(ngModel)]="filters.maxPrice" (input)="emitFilters()"
             placeholder="Máx" class="filter-input price-input">
    </div>
  </div>

</aside>

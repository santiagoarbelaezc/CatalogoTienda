<!-- Mobile Filter Toggle Button -->
<div class="lg:hidden flex items-center justify-between p-4 bg-luxury-900 border border-luxury-800 rounded-2xl mb-4">
  <span class="text-luxury-200 font-medium">Filtros y Búsqueda</span>
  <button 
    (click)="isMobileFiltersOpen = !isMobileFiltersOpen"
    class="flex items-center gap-2 px-4 py-2 bg-accent-gold text-luxury-950 font-semibold rounded-xl hover:bg-opacity-90 active:scale-95 transition-all">
    <span class="material-symbols-rounded">filter_alt</span>
    {{ isMobileFiltersOpen ? 'Cerrar' : 'Filtrar' }}
  </button>
</div>

<!-- Filters Sidebar Panel -->
<aside 
  [class.hidden]="!isMobileFiltersOpen"
  class="lg:block w-full lg:w-72 glass-card p-6 rounded-2xl border border-luxury-800 flex flex-col gap-6 text-sm animate-fade-in-up">
  
  <div class="flex items-center justify-between pb-4 border-b border-luxury-800">
    <h3 class="text-base font-bold tracking-wider text-gold-gradient uppercase">Filtros de Catálogo</h3>
    <button 
      (click)="resetFilters()" 
      class="text-xs text-luxury-400 hover:text-accent-gold transition-colors flex items-center gap-1">
      <span class="material-symbols-rounded text-sm">restart_alt</span> Limpiar todo
    </button>
  </div>

  <!-- Búsqueda -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Buscar</label>
    <div class="relative">
      <input 
        type="text" 
        [(ngModel)]="filters.searchQuery" 
        (input)="emitFilters()"
        placeholder="Nombre, SKU..."
        class="w-full bg-luxury-900 border border-luxury-800 rounded-xl px-4 py-2.5 pl-10 text-luxury-100 placeholder-luxury-500 focus:outline-none focus:border-accent-gold transition-colors">
      <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-luxury-500 text-lg">search</span>
    </div>
  </div>

  <!-- Ordenar por -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Ordenar Por</label>
    <select 
      [(ngModel)]="filters.sortBy" 
      (change)="emitFilters()"
      class="w-full bg-luxury-900 border border-luxury-800 rounded-xl px-4 py-2.5 text-luxury-100 focus:outline-none focus:border-accent-gold transition-colors appearance-none cursor-pointer">
      <option value="name-asc">Nombre: A-Z</option>
      <option value="name-desc">Nombre: Z-A</option>
      <option value="price-asc">Precio: Menor a Mayor</option>
      <option value="price-desc">Precio: Mayor a Menor</option>
    </select>
  </div>

  <!-- Categorías y Subcategorías -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Categorías</label>
    <div class="flex flex-col gap-1 max-h-48 overflow-y-auto pr-1">
      <button 
        (click)="selectCategory(null)"
        [class.text-accent-gold]="filters.categoriaId === null"
        [class.bg-luxury-900]="filters.categoriaId === null"
        class="text-left px-3 py-2 rounded-lg text-luxury-300 hover:bg-luxury-900 hover:text-luxury-100 transition-all font-medium flex items-center justify-between">
        <span>Todas</span>
      </button>
      <div *ngFor="let cat of categorias" class="flex flex-col">
        <!-- Main Category Label -->
        <span class="text-xs font-semibold text-luxury-500 px-3 py-1 mt-1">{{ cat.nombre }}</span>
        <!-- Subcategories -->
        <button 
          *ngFor="let sub of cat.subcategorias"
          (click)="selectCategory(sub.id)"
          [class.text-accent-gold]="filters.categoriaId === sub.id"
          [class.bg-luxury-900]="filters.categoriaId === sub.id"
          class="text-left px-5 py-1.5 rounded-lg text-luxury-300 hover:bg-luxury-900 hover:text-luxury-100 transition-all flex items-center justify-between text-xs">
          <span>{{ sub.nombre }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Género -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Género</label>
    <div class="grid grid-cols-3 gap-1.5 bg-luxury-900 p-1 rounded-xl">
      <button 
        *ngFor="let gen of ['', 'Hombre', 'Mujer']" 
        (click)="filters.genero = gen; emitFilters()"
        [class.bg-luxury-800]="filters.genero === gen"
        [class.text-accent-gold]="filters.genero === gen"
        class="py-1.5 rounded-lg text-xs font-medium text-luxury-300 hover:text-luxury-100 transition-all">
        {{ gen === '' ? 'Todos' : gen }}
      </button>
    </div>
  </div>

  <!-- Marcas -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Marca</label>
    <select 
      [(ngModel)]="filters.marcaId" 
      (change)="emitFilters()"
      class="w-full bg-luxury-900 border border-luxury-800 rounded-xl px-4 py-2.5 text-luxury-100 focus:outline-none focus:border-accent-gold transition-colors">
      <option [ngValue]="null">Todas las marcas</option>
      <option *ngFor="let m of marcas" [ngValue]="m.id">{{ m.nombre }}</option>
    </select>
  </div>

  <!-- Tallas -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Talla</label>
    <div class="flex flex-wrap gap-1.5">
      <button 
        *ngFor="let t of tallas" 
        (click)="selectTalla(t.id)"
        [class.bg-accent-gold]="filters.tallaId === t.id"
        [class.text-luxury-950]="filters.tallaId === t.id"
        [class.border-accent-gold]="filters.tallaId === t.id"
        [class.border-luxury-800]="filters.tallaId !== t.id"
        class="w-10 h-10 border rounded-xl flex items-center justify-center font-bold text-xs hover:border-luxury-500 active:scale-95 transition-all">
        {{ t.nombre }}
      </button>
    </div>
  </div>

  <!-- Colores -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Color</label>
    <div class="flex flex-wrap gap-2">
      <button 
        *ngFor="let c of colores" 
        (click)="selectColor(c.id)"
        [style.background-color]="c.hex"
        [title]="c.nombre"
        [class.ring-2]="filters.colorId === c.id"
        [class.ring-offset-2]="filters.colorId === c.id"
        [class.ring-offset-luxury-950]="filters.colorId === c.id"
        [class.ring-accent-gold]="filters.colorId === c.id"
        class="w-7 h-7 rounded-full border border-luxury-800 hover:scale-110 transition-transform active:scale-90 relative">
        <span *ngIf="c.nombre === 'Blanco Crudo'" class="absolute inset-0 border border-luxury-400/20 rounded-full"></span>
      </button>
    </div>
  </div>

  <!-- Telas -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Material / Tela</label>
    <select 
      [(ngModel)]="filters.telaId" 
      (change)="emitFilters()"
      class="w-full bg-luxury-900 border border-luxury-800 rounded-xl px-4 py-2.5 text-luxury-100 focus:outline-none focus:border-accent-gold transition-colors">
      <option [ngValue]="null">Todos los materiales</option>
      <option *ngFor="let t of telas" [ngValue]="t.id">{{ t.nombre }}</option>
    </select>
  </div>

  <!-- Rango de Precios -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold tracking-wider text-luxury-400 uppercase">Rango de Precios (COP)</label>
    <div class="grid grid-cols-2 gap-2">
      <input 
        type="number" 
        [(ngModel)]="filters.minPrice" 
        (input)="emitFilters()"
        placeholder="Mín"
        class="w-full bg-luxury-900 border border-luxury-800 rounded-xl px-3 py-2 text-luxury-100 placeholder-luxury-600 focus:outline-none focus:border-accent-gold text-center">
      <input 
        type="number" 
        [(ngModel)]="filters.maxPrice" 
        (input)="emitFilters()"
        placeholder="Máx"
        class="w-full bg-luxury-900 border border-luxury-800 rounded-xl px-3 py-2 text-luxury-100 placeholder-luxury-600 focus:outline-none focus:border-accent-gold text-center">
    </div>
  </div>
</aside>
